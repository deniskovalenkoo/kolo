<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Получаем текущий URL и его параметры
    const urlParams = new URLSearchParams(window.location.search);

    // Проверяем наличие всех UTM меток
    const utmId = urlParams.get('utm_id');
    const utmTerm = urlParams.get('utm_term');
    const utmSource = urlParams.get('utm_source');
    const utmMedium = urlParams.get('utm_medium');
    const utmContent = urlParams.get('utm_content');
    const utmCampaign = urlParams.get('utm_campaign');

    // Функция для добавления UTM меток к каждой ссылке (включая внешние)
    function addUtmToLinks() {
      const allLinks = document.querySelectorAll('a'); // Все ссылки

      allLinks.forEach(link => {
        const href = link.getAttribute('href');

        // Пропускаем якорные ссылки (те, которые ведут только на эту же страницу)
        if (href && !href.includes('#')) {
          let utmParamsArray = [];

          // Добавляем только не пустые UTM параметры
          if (utmId) {
            utmParamsArray.push(`utm_id=${utmId}`);
          }
          if (utmTerm) {
            utmParamsArray.push(`utm_term=${utmTerm}`);
          }
          if (utmSource) {
            utmParamsArray.push(`utm_source=${utmSource}`);
          }
          if (utmMedium) {
            utmParamsArray.push(`utm_medium=${utmMedium}`);
          }
          if (utmContent) {
            utmParamsArray.push(`utm_content=${utmContent}`);
          }
          if (utmCampaign) {
            utmParamsArray.push(`utm_campaign=${utmCampaign}`);
          }

          // Добавляем параметры, только если есть хотя бы один UTM параметр
          if (utmParamsArray.length > 0) {
            const separator = href.includes('?') ? '&' : '?';
            const utmParams = utmParamsArray.join('&');

            // Добавляем UTM параметры к ссылке
            link.setAttribute('href', href + separator + utmParams);
          }
        }
      });
    }

    // Добавляем UTM метки к ссылкам на текущей странице
    addUtmToLinks();
  });
</script>

 <script>
function smoothscroll() {
    // Smooth scrolling
    const isHome = document.querySelectorAll('.body-6').length;
  	if (!isHome){return;}
  	const lenis = new Lenis({ resize: true });

    function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
    }

    // Grab all elements that have a "data-target" attribute
    const scrollButtons = document.querySelectorAll('[data-target]');

    // For each element, listen to a "click" event
    scrollButtons.forEach(button => {
        button.addEventListener('click', e => {
            e.preventDefault();

            // get the DOM element by the ID (data-target value)
            const target = button.dataset.target;
            const $el = document.getElementById(target.replace('#', ''));

            // Use lenis.scrollTo() to scroll the page to the right element
            lenis.scrollTo($el, {
                offset: 0,
                immediate: false,
                duration: 1,
                easing: (x) => (x < 0.5 ? 4 * x * x * x : 1 - (-2 * x + 2) ** 3 / 2) // https://easings.net
            });
        });
    });

    requestAnimationFrame(raf);
}

function init() {
  var myLazyLoad = new LazyLoad({
    elements_selector: ".lazy"
});
  myLazyLoad.update();
    smoothscroll();
    new WordPlay({
        className: 'n-heder-line-one', // the text element
        mode: 'letter', // choose between letter or word
        offset: 100, // offset if revealed by scroll
        speed: 0.5,
        delay: 0.025 // stagger delay
    });

    new WordPlay({
        className: 'n-heder-line-two', // the text element
        mode: 'letter', // choose between letter or word
        offset: 100, // offset if revealed by scroll
        speed: 0.5,
        delay: 0.025 // stagger delay
    });
    // document.getElementById('n-video-bg').play();
}

function loader() {
    // Отримуємо посилання на елемент
    const target = document.querySelector('.n-page_loading');

    // Функція, яка перевіряє, чи display: none
    function isHidden(element) {
        return window.getComputedStyle(element).display === 'none';
    }

    if (target) {
        // Створюємо обсервер
        const observer = new MutationObserver((mutationsList) => {
            for (const mutation of mutationsList) {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    if (isHidden(target)) {
                        console.log('Елемент став display: none');
                        init();
                        // Зупиняємо обсервер після спрацювання
                        observer.disconnect();
                        // Можна викликати додаткову логіку тут
                    }
                }
            }
        });

        // Налаштування обсерверу: слідкуємо за змінами атрибутів
        observer.observe(target, {
            attributes: true,
            attributeFilter: ['style']
        });
    } else {
        init();
    }
}
window.Webflow.push(loader);
  </script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.0.2/TweenMax.min.js" type="text/javascript"></script>
<script>
const letterWrapClass = 'n-letter-wrap';
const letterWrapElements = document.getElementsByClassName(letterWrapClass);
[...letterWrapElements].forEach(el => {
  letterWrap(el, letterWrapClass);
  letterAnimation(el, letterWrapClass);
});
function letterWrap(el, cls) {
  const words = el.textContent.split(' ');
  const letters = []; 
  cls = cls || 'n-letter-wrap'  
  words.forEach(word => {
    let html = '';
    for (var letter in word) {
      html += `
        <span class="${cls}__char">
          <span class="${cls}__char-inner" data-letter="${word[letter]}">
            ${word[letter]}
          </span>
        </span>
      `;
    };   
    let wrappedWords = `<span class="${cls}__word">${html}</span>`;
    letters.push(wrappedWords);
  });
  return el.innerHTML = letters.join(' ');
}
function letterAnimation(el, cls) {
  const tl = new TimelineMax({ paused: true });
  const characters = el.querySelectorAll(`.${cls}__char-inner`);
  const duration = el.hasAttribute('data-duration') ? el.dataset.duration : 0.3;
  const stagger = el.hasAttribute('data-stagger') ? el.dataset.stagger : 0.025; 
  el.animation = tl.staggerTo(characters, duration, {
    y: '-100%',
    delay: 0.1,
    ease: Power2.easeOut
  }, stagger);      
  el.addEventListener('mouseenter', (event) => event.currentTarget.animation.play());
  el.addEventListener('mouseout', (event) => el.animation.pause(0)());
}
</script>
